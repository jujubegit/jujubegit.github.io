# Site settings
title: Articles et travaux de recherche # site title
description: >- # site description
  ...
lang: fr-FR # default lang
timezone: Europe/Paris # set your timezone
image: assets/img/pixel_screens.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/jujubegit.github.io # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author: 
  name: Juh # author name
  bio: >- # tell to the world
    Site personnel rassemblant divers articles et travaux de recherche en sciences sociales, réalisés au cours de ma formation en science politique à l'Université Vincennes Saint-Denis 
  username: juh # general username
  github: jujubegit # github username
  #twitter: twitter_username # twitter username
  #facebook: facebook_username # facebook username
  email: jujubemail@proton.me # email adress
  avatar: /assets/img/pixel_screens.png # change with your own avatar

# URL settings
url: "https://jujubegit.github.io" #
baseurl:
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
